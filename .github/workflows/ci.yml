name: CI 🚀
on: pull_request

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: abatilo/actions-poetry@v2
        with:
          poetry-version: "2.1.1"

      - name: Install dependencies
        run: make deps

      - name: Patch Python 3.10 dependencies
        # This fixes the ModuleNotFoundError: No module named 'exceptiongroup'
        if: matrix.python-version == '3.10'
        run: poetry run pip install exceptiongroup tomli

      - name: Install testing requirements
        run: poetry add requests==2.32.5

      - name: Lint with flake8
        run: make lint

      - name: Test with pytest
        env:
          VULNCHECK_API_TOKEN: ${{ secrets.VULNCHECK_API_TOKEN }}
        run: make test
